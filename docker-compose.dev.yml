
services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    environment:
      NODE_ENV: development
      API_URL: http://backend:8080
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
          ignore:
            - node_modules/
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/next.config.ts
        - action: rebuild
          path: ./frontend/tailwind.config.ts
    restart: "no"

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/catalog_itens?TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-catalog}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-catalog-photos}
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+ExitOnOutOfMemoryError
        -Dlogging.level.org.hibernate.SQL=DEBUG
        -Dlogging.level.org.hibernate.orm.jdbc.bind=TRACE
    ports:
      - "8080:8080"
    restart: "no"

  db:
    ports:
      - "5432:5432"
    restart: "no"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: "no"
