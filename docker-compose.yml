
services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_TELEMETRY_DISABLED: "1"
    image: catalog-itens/frontend:latest
    ports:
      - "4000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catalog-http.rule=Host(`catalogo.paulobof.com.br`)"
      - "traefik.http.routers.catalog-http.entrypoints=web"
      - "traefik.http.routers.catalog-http.service=catalog-frontend"
      - "traefik.http.routers.catalog-https.rule=Host(`catalogo.paulobof.com.br`)"
      - "traefik.http.routers.catalog-https.entrypoints=websecure"
      - "traefik.http.routers.catalog-https.tls=true"
      - "traefik.http.routers.catalog-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.catalog-https.service=catalog-frontend"
      - "traefik.http.services.catalog-frontend.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"
    environment:
      NODE_ENV: production
      API_URL: http://backend:8080
      NEXT_PUBLIC_API_URL: ""
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required (min 32 chars)}
    networks:
      - frontend-net
      - dokploy-network
      - app-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: catalog-itens/backend:latest
    container_name: catalog-backend
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/catalog_itens?TimeZone=UTC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-catalog}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-2}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:-30000}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:-1800000}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-catalogsvc}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-catalog-photos}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:-5MB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:-15MB}
      APP_STORAGE_MINIO_PRESIGNED_URL_TTL: ${APP_STORAGE_MINIO_PRESIGNED_URL_TTL:-60}
      SEED_USER_1_EMAIL: ${SEED_USER_1_EMAIL:-}
      SEED_USER_1_PASSWORD: ${SEED_USER_1_PASSWORD:-}
      SEED_USER_1_NAME: ${SEED_USER_1_NAME:-}
      SEED_USER_2_EMAIL: ${SEED_USER_2_EMAIL:-}
      SEED_USER_2_PASSWORD: ${SEED_USER_2_PASSWORD:-}
      SEED_USER_2_NAME: ${SEED_USER_2_NAME:-}
      APP_AUTH_PEPPER: ${APP_AUTH_PEPPER:-pepper2}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required (min 32 chars)}
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+ExitOnOutOfMemoryError
    networks:
      - app-net
      - db-net
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: catalog-db
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-catalog_itens}
      POSTGRES_USER: ${POSTGRES_USER:-catalog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=4MB
      - -c
      - idle_in_transaction_session_timeout=30000
      - -c
      - statement_timeout=10000
      - -c
      - log_min_duration_statement=1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catalog} -d ${POSTGRES_DB:-catalog_itens}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: unless-stopped

  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: catalog-db-backup
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-catalog_itens}
      POSTGRES_USER: ${POSTGRES_USER:-catalog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
      SCHEDULE: ${DB_BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${DB_BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${DB_BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${DB_BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: 8080
    volumes:
      - postgres_backup:/backups
    networks:
      - db-net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: catalog-minio
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: catalog-minio-init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-catalogsvc}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-catalog-photos}
    networks:
      - app-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo 'Configuring mc alias...' &&
        mc alias set catalog http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&

        echo 'Creating bucket...' &&
        mc mb --ignore-existing catalog/$${MINIO_BUCKET} &&

        echo 'Setting bucket to private (deny anonymous)...' &&
        mc anonymous set none catalog/$${MINIO_BUCKET} &&

        echo 'Creating service account...' &&
        mc admin user svcacct add --access-key $${MINIO_ACCESS_KEY} --secret-key $${MINIO_SECRET_KEY} catalog $${MINIO_ROOT_USER} 2>&1 || echo 'Service account may already exist, continuing...' &&

        echo 'minio-init completed successfully.'
      "
    restart: "no"

volumes:
  postgres_data:
    driver: local
  postgres_backup:
    driver: local
  minio_data:
    driver: local

networks:
  frontend-net:
    driver: bridge

  app-net:
    driver: bridge

  db-net:
    driver: bridge
    internal: true

  dokploy-network:
    external: true
